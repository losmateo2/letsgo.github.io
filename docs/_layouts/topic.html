<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon/favicon-16x16.png" sizes="16x16" type="image/png">
    <link rel="icon" href="favicon/favicon-32x32.png" sizes="32x32" type="image/png">
</head>
<body>

    <header>
        <h1>{{ page.header_title }}</h1>
        <p>{{ page.header_desc }}</p>
    </header>

    <div id="nav-placeholder"></div>

    <main>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search {{ page.data_source }}...">
        </div>

        <div class="filter-container" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <select id="difficultyFilter" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
                <option value="">All Difficulties</option>
                {% assign difficulties = site.data[page.data_source] | map: "difficulty" | compact | uniq %}
                {% for d in difficulties %}
                <option value="{{ d }}">{{ d }}</option>
                {% endfor %}
            </select>
            <select id="topicFilter" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
                <option value="">All Topics</option>
                {% assign topics = site.data[page.data_source] | map: "topic" | compact | uniq %}
                {% for t in topics %}
                {% if t != 'All' %}
                <option value="{{ t }}">{{ t }}</option>
                {% endif %}
                {% endfor %}
                <option value="All">All</option>
            </select>
            <select id="typeFilter" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
                <option value="">All Types</option>
                {% assign types = site.data[page.data_source] | map: "type" | compact | uniq %}
                {% for ty in types %}
                <option value="{{ ty }}">{{ ty }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid-container">
            {% for item in site.data[page.data_source] %}
            <div class="card">
                <h3>{{ item.title }}</h3>
                <div class="tags-container">
                    <span class="tag tag-difficulty">{{ item.difficulty }}</span>
                    <span class="tag tag-topic">{{ item.topic }}</span>
                    <span class="tag tag-type">{{ item.type }}</span>
                </div>
                <p>{{ item.desc }}</p>
                <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer">{{ item.link_text }} &rarr;</a>
            </div>
            {% endfor %}
        </div>
    </main>

    <script src="js/nav.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
